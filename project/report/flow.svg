<svg viewBox="0 0 700 820" xmlns="http://www.w3.org/2000/svg" role="img" font-family="monospace, sans-serif" font-size="13">
  <title>AIAutoRTLAnR Abstraction Flow</title>
  <desc>Flowchart of the backtracking DFS abstraction loop</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- START -->
  <rect x="250" y="20" width="200" height="40" rx="20" fill="#5b6af0"/>
  <text x="350" y="42" text-anchor="middle" fill="white" font-weight="bold">START</text>
  <text x="350" y="56" text-anchor="middle" fill="white" font-size="10">original design + property</text>

  <line x1="350" y1="60" x2="350" y2="90" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [1] Baseline -->
  <rect x="190" y="90" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="110" text-anchor="middle" fill="#111" font-weight="bold">[1] Baseline</text>
  <text x="350" y="126" text-anchor="middle" fill="#555" font-size="11">run gv (PDR) on original → confirm TIMEOUT</text>

  <line x1="350" y1="134" x2="350" y2="164" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [2] Init DFS -->
  <rect x="190" y="164" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="184" text-anchor="middle" fill="#111" font-weight="bold">[2] Init search</text>
  <text x="350" y="200" text-anchor="middle" fill="#555" font-size="11">freed=[], banned={}, attempts=0</text>

  <line x1="350" y1="208" x2="350" y2="238" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- diamond: candidates? -->
  <polygon points="350,238 460,278 350,318 240,278" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="274" text-anchor="middle" fill="#111" font-weight="bold">candidates?</text>
  <text x="350" y="290" text-anchor="middle" fill="#555" font-size="11">regs not in freed ∪ banned</text>

  <!-- NO branch left -->
  <line x1="240" y1="278" x2="100" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="165" y="270" text-anchor="middle" fill="#555" font-size="11">NO</text>

  <!-- diamond: freed empty? -->
  <polygon points="100,278 165,318 100,358 35,318" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="100" y="314" text-anchor="middle" fill="#111" font-size="11" font-weight="bold">freed</text>
  <text x="100" y="328" text-anchor="middle" fill="#111" font-size="11" font-weight="bold">empty?</text>

  <!-- YES → fail -->
  <line x1="100" y1="358" x2="100" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="110" y="382" fill="#555" font-size="11">YES</text>
  <rect x="40" y="400" width="120" height="36" rx="18" fill="#e05252"/>
  <text x="100" y="421" text-anchor="middle" fill="white" font-weight="bold">FAIL</text>
  <text x="100" y="433" text-anchor="middle" fill="white" font-size="9">search exhausted</text>

  <!-- NO → backtrack -->
  <line x1="35" y1="318" x2="10" y2="318" stroke="#555" stroke-width="1.5"/>
  <line x1="10" y1="318" x2="10" y2="500" stroke="#555" stroke-width="1.5"/>
  <text x="14" y="340" fill="#555" font-size="11">NO</text>
  <rect x="20" y="460" width="160" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="100" y="480" text-anchor="middle" fill="#111" font-weight="bold">BACKTRACK</text>
  <text x="100" y="496" text-anchor="middle" fill="#555" font-size="10">pop freed; ban at parent</text>
  <line x1="10" y1="500" x2="10" y2="560" stroke="#555" stroke-width="1.5"/>
  <line x1="10" y1="560" x2="240" y2="560" stroke="#555" stroke-width="1.5"/>
  <line x1="240" y1="560" x2="240" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- YES (candidates exist) → LLM propose -->
  <line x1="350" y1="318" x2="350" y2="348" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="336" fill="#555" font-size="11">YES</text>

  <!-- [3] LLM proposes -->
  <rect x="190" y="348" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="368" text-anchor="middle" fill="#111" font-weight="bold">[3] LLM selects register</text>
  <text x="350" y="384" text-anchor="middle" fill="#555" font-size="11">returns JSON {"register": "...", "reason": "..."}</text>

  <line x1="350" y1="392" x2="350" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [4] Mechanical free -->
  <rect x="190" y="422" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="442" text-anchor="middle" fill="#111" font-weight="bold">[4] Applier: free_register()</text>
  <text x="350" y="458" text-anchor="middle" fill="#555" font-size="11">delete decl + assignments; add primary input</text>

  <line x1="350" y1="466" x2="350" y2="496" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [5] syntax check -->
  <rect x="190" y="496" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="516" text-anchor="middle" fill="#111" font-weight="bold">[5] Syntax check</text>
  <text x="350" y="532" text-anchor="middle" fill="#555" font-size="11">cirread -v (gv's own front-end)</text>

  <line x1="350" y1="540" x2="350" y2="570" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- [6] gv PDR proof -->
  <rect x="190" y="570" width="320" height="44" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="590" text-anchor="middle" fill="#111" font-weight="bold">[6] Checker: gv PDR proof</text>
  <text x="350" y="606" text-anchor="middle" fill="#555" font-size="11">attempts++  (budget: 5 by default)</text>

  <line x1="350" y1="614" x2="350" y2="644" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- diamond verdict -->
  <polygon points="350,644 490,694 350,744 210,694" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="690" text-anchor="middle" fill="#111" font-weight="bold">gv verdict?</text>
  <text x="350" y="706" text-anchor="middle" fill="#555" font-size="11">PROVED / TIMEOUT / CEX</text>

  <!-- PROVED → right -->
  <line x1="490" y1="694" x2="580" y2="694" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="530" y="686" text-anchor="middle" fill="#555" font-size="11">PROVED</text>
  <rect x="580" y="670" width="110" height="48" rx="24" fill="#3db87a"/>
  <text x="635" y="691" text-anchor="middle" fill="white" font-weight="bold">SUCCESS</text>
  <text x="635" y="706" text-anchor="middle" fill="white" font-size="9">sound proof holds</text>
  <text x="635" y="718" text-anchor="middle" fill="white" font-size="9">on original</text>

  <!-- TIMEOUT → accept cut, loop -->
  <line x1="350" y1="744" x2="350" y2="780" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="362" y="764" fill="#555" font-size="11">TIMEOUT</text>
  <rect x="190" y="780" width="320" height="32" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="350" y="801" text-anchor="middle" fill="#111" font-size="11">freed.append(reg) → descend (free one more)</text>
  <line x1="190" y1="796" x2="160" y2="796" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="796" x2="160" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CEX → ban, loop -->
  <line x1="210" y1="694" x2="140" y2="694" stroke="#555" stroke-width="1.5"/>
  <text x="172" y="686" text-anchor="middle" fill="#555" font-size="11">CEX</text>
  <rect x="20" y="670" width="120" height="36" rx="6" fill="#f4f4f8" stroke="#ccc" stroke-width="1.5"/>
  <text x="80" y="689" text-anchor="middle" fill="#111" font-size="11">banned.add(reg)</text>
  <text x="80" y="702" text-anchor="middle" fill="#555" font-size="10">ban at this node</text>
  <line x1="80" y1="670" x2="80" y2="600" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="600" x2="160" y2="600" stroke="#555" stroke-width="1.5"/>
  <line x1="160" y1="600" x2="160" y2="278" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
